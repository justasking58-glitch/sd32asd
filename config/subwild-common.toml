#Scans additional underground cave spaces to improve terrain generation compatibility at a lower performance cost (may drastically reduce cave feature generation in large caves).
"Expensive Scan" = true
#Adapts SubWild cave selection to the biome above the cave so modded surface biomes can use matching cave themes. Disable this to use the older tagged-biome behavior and rocky fallback.
"Adapt Cave Biomes to Modded Biomes" = true
#The amount of non-solid blocks in front of a cave wall at which stairs and slabs spawn at a reduced rate to avoid high density narrow caves
# Default: 3
# Range: 0 ~ 16
"Slope Threshold" = 3
#The dimensions in which cave biomes will generate in
"Dimension Whitelist" = ["minecraft:overworld"]

[Features]
	#Enable pebble generation in rocky and sandy cave biomes.
	"Generate Pebbles" = true
	#Allow pebble items to be thrown as small projectiles with a short shared cooldown. Sneaking while aiming at a block will throw instead of place.
	"Throwable Pebbles" = true
	#Enable to generate vines in fungal, lush and mossy cave biomes
	"Generate Vines" = true
	#Enable to generate puddles in lush, mossy muddy, dead coral cave biomes
	"Generate Puddles" = true
	#Enable to generate stairs in cave biomes. Slope Generation Chance must also be above 0 for stairs to generate.
	"Generate Stairs" = true
	#Enable to generate slabs in cave biomes. Slope Generation Chance must also be above 0 for slabs to generate.
	"Generate Slabs" = true
	#Enable to generate patches (varying heights of slabs and snow) in cave biomes.
	"Generate Patches" = true
	#Enable to generate speleothems in cave biomes.
	"Generate Speleothems" = true
	#Allows waterloggable cave features like speleothems, slabs, and stairs to generate inside water-filled caves and cave lakes.
	"Generate Features in Water" = true
	#Enable to generate glowing foxfires in cave biomes.
	"Generate Foxfires" = true
	#Enable all SubWild custom ore variants. When disabled, no SubWild ores will generate.
	"Generate SubWild Ores" = true
	#Enable to generate dead bushes in mesa, sandy and sandy rocky cave biomes.
	"Generate Dead Bushes" = true
	#Enable to generate lily pads in lush, mossy and mossy rocky cave biomes.
	"Generate Lily Pads" = true
	#Enable to generate wall coral in coral cave biomes.
	"Generate Wall Coral" = true
	#Enable to generate dead wall coral in dead coral cave biomes.
	"Generate Dead Wall Coral" = true
	#Enable to generate floor coral in coral cave biomes.
	"Generate Floor Coral" = true
	#Enable to generate dead floor coral in dead coral cave biomes.
	"Generate Dead Floor Coral" = true
	#Enable to generate saplings in jungle and jungle volcanic cave biomes.
	"Generate Saplings" = true
	#Allows SubWild cave decorations to generate inside large structures and underground complexes (excluding mineshafts).
	"Generate In Structures" = false
	#Allows shears to clean moss off vanilla mossy blocks, stairs, slabs, and walls, dropping a vine and restoring the clean variant.
	"Shear Vanilla Mossy Blocks" = true

[Speleothems]
