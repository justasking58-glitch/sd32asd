	["Cave Types".Global]
		#Replace every SubWild cave type with the selected cave type. This overrides individual cave type settings.
		"Replace All Cave Types" = false
		#Extends the selected replacement cave type through all lower cave layers down to bedrock.
		"Replace Deep/Tuff Caves" = true
		#The cave type used when the global replace-all setting is enabled.
		"Replacement Cave Type" = "subwild:basic"

